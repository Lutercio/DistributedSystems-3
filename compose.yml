name: distributed-systems

x-eureka-environment: &eureka-environment
  JAVA_TOOL_OPTIONS: "-Xms32m -Xmx192m"
  PORT: "8761"
  EUREKA_PEERS: ${EUREKA_PEERS:?Set EUREKA_PEERS in .env}
  CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:?Set CONFIG_SERVER_URL in .env}

x-eureka-common: &eureka-common
  image: distributed-systems/eureka:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
  build:
    context: .
    dockerfile: EurekaServer/Dockerfile
    args:
      RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
      BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
  restart: "on-failure:3"
  mem_limit: 384m
  networks:
    - discovery
  depends_on:
    config-server:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 30s
  stop_grace_period: 25s

x-gateway-environment: &gateway-environment
  JAVA_TOOL_OPTIONS: "-Xms32m -Xmx192m"
  PORT: "8080"
  CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:?Set CONFIG_SERVER_URL in .env}
  EUREKA_URL: ${EUREKA_URL:?Set EUREKA_URL in .env}
  ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:?Set ZIPKIN_ENDPOINT in .env}
  TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:?Set TRACING_SAMPLING_PROBABILITY in .env}

x-gateway-common: &gateway-common
  image: distributed-systems/gateway:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
  build:
    context: .
    dockerfile: APIGateway/Dockerfile
    args:
      RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
      BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
  restart: "on-failure:3"
  mem_limit: 384m
  networks:
    - discovery
  depends_on:
    config-server:
      condition: service_healthy
    eureka-cluster:
      condition: service_healthy
    zipkin:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 30s
  stop_grace_period: 25s

x-observed-service-environment: &observed-service-environment
  JAVA_TOOL_OPTIONS: "-Xms32m -Xmx256m"
  CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:?Set CONFIG_SERVER_URL in .env}
  EUREKA_URL: ${EUREKA_URL:?Set EUREKA_URL in .env}
  ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:?Set ZIPKIN_ENDPOINT in .env}
  TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:?Set TRACING_SAMPLING_PROBABILITY in .env}

x-question-service-common: &question-service-common
  image: distributed-systems/question-service:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
  build:
    context: .
    dockerfile: QuestionService/Dockerfile
    args:
      RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
      BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
  restart: "on-failure:3"
  mem_limit: 512m
  networks:
    - discovery
  depends_on:
    config-server:
      condition: service_healthy
    eureka-cluster:
      condition: service_healthy
    rag-service-1:
      condition: service_healthy
    rag-service-2:
      condition: service_healthy
    question-normalizer:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 30s
  stop_grace_period: 25s

x-rag-service-common: &rag-service-common
  image: distributed-systems/rag-service:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
  build:
    context: .
    dockerfile: RagService/Dockerfile
    args:
      RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
      BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
  restart: "on-failure:3"
  mem_limit: 768m
  networks:
    - discovery
  depends_on:
    config-server:
      condition: service_healthy
    eureka-cluster:
      condition: service_healthy
    zipkin:
      condition: service_healthy
    postgres:
      condition: service_healthy
    ollama-init:
      condition: service_completed_successfully
    regulation-mcp:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 30s
  stop_grace_period: 25s

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie@sha256:5c97c57367a485a8e99389548db67d441ab1a878f5492c3df04989f34ecf3c75
    restart: unless-stopped
    mem_limit: 768m
    networks:
      - discovery
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  ollama:
    image: ollama/ollama:0.31.1
    restart: unless-stopped
    mem_limit: 2g
    networks:
      - discovery
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  ollama-init:
    image: ollama/ollama:0.31.1
    restart: "no"
    mem_limit: 512m
    networks:
      - discovery
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/ollama"]
    command: ["pull", "${OLLAMA_EMBEDDING_MODEL:-bge-m3:567m}"]

  rag-vector-reset:
    image: postgres:17.5-alpine
    profiles: ["admin"]
    restart: "no"
    mem_limit: 128m
    networks:
      - discovery
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGDATABASE: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      PGUSER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    command:
      - /bin/sh
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 -c 'DROP TABLE IF EXISTS vector_store; DROP TABLE IF EXISTS corpus_ingestion;'

  config-git-init:
    image: alpine/git:2.54.0@sha256:e043be20669db13cbcfb6190192babee4cf2dca98709bb0c2d08ca2d35a0a06a
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        rm -rf /tmp/config-source /srv/git/config.git.next
        mkdir -p /tmp/config-source /srv/git
        cp -R /seed/. /tmp/config-source/
        cd /tmp/config-source
        git init --initial-branch=main
        git config user.name "Local Config Repository"
        git config user.email "config-repository@localhost"
        git add config
        GIT_AUTHOR_DATE="2000-01-01T00:00:00Z" GIT_COMMITTER_DATE="2000-01-01T00:00:00Z" git commit -m "Seed centralized configuration"
        git clone --bare . /srv/git/config.git.next
        git --git-dir=/srv/git/config.git.next symbolic-ref HEAD refs/heads/main
        git --git-dir=/srv/git/config.git.next update-server-info
        next_revision="$$(git --git-dir=/srv/git/config.git.next rev-parse refs/heads/main)"
        current_revision=""
        if [ -d /srv/git/config.git ]; then
          current_revision="$$(git --git-dir=/srv/git/config.git rev-parse refs/heads/main 2>/dev/null || true)"
        fi
        if [ "$$current_revision" = "$$next_revision" ]; then
          rm -rf /srv/git/config.git.next
        else
          rm -rf /srv/git/config.git
          mv /srv/git/config.git.next /srv/git/config.git
        fi
    networks:
      - discovery
    volumes:
      - ./config-repository:/seed:ro
      - config-git-data:/srv/git
    restart: "no"
    mem_limit: 128m

  config-git:
    image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
    command: ["httpd", "-f", "-p", "80", "-h", "/srv/git"]
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - discovery
    volumes:
      - config-git-data:/srv/git:ro
    depends_on:
      config-git-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/config.git/info/refs | grep -q refs/heads/main"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  config-server:
    image: distributed-systems/config-server:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
    build:
      context: .
      dockerfile: ConfigServer/Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
        BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
    environment:
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx192m"
      PORT: "8888"
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:?Set CONFIG_GIT_URI in .env}
      CONFIG_GIT_DEFAULT_LABEL: ${CONFIG_GIT_DEFAULT_LABEL:?Set CONFIG_GIT_DEFAULT_LABEL in .env}
      SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME: ${CONFIG_GIT_USERNAME:-}
      SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD: ${CONFIG_GIT_PASSWORD:-}
    restart: "on-failure:3"
    mem_limit: 384m
    networks:
      - discovery
    depends_on:
      config-git:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CONFIG_SERVER_HOST_PORT:?Set CONFIG_SERVER_HOST_PORT in .env}:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 25s

  eureka-1:
    <<: *eureka-common
    hostname: eureka-1
    environment:
      <<: *eureka-environment
      EUREKA_HOSTNAME: eureka-1
    ports:
      - "127.0.0.1:${EUREKA_1_HOST_PORT:?Set EUREKA_1_HOST_PORT in .env}:8761"

  eureka-2:
    <<: *eureka-common
    hostname: eureka-2
    environment:
      <<: *eureka-environment
      EUREKA_HOSTNAME: eureka-2
    ports:
      - "127.0.0.1:${EUREKA_2_HOST_PORT:?Set EUREKA_2_HOST_PORT in .env}:8761"

  eureka-3:
    <<: *eureka-common
    hostname: eureka-3
    environment:
      <<: *eureka-environment
      EUREKA_HOSTNAME: eureka-3
    ports:
      - "127.0.0.1:${EUREKA_3_HOST_PORT:?Set EUREKA_3_HOST_PORT in .env}:8761"

  eureka-cluster:
    image: haproxy:3.2.20-alpine@sha256:9f196dc9ec57310a1a430939221b33b36c14113497aca7ead9b13f4d5c2d37f5
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - discovery
    depends_on:
      eureka-1:
        condition: service_healthy
      eureka-2:
        condition: service_healthy
      eureka-3:
        condition: service_healthy
    volumes:
      - ./infrastructure/haproxy/eureka.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  gateway-1:
    <<: *gateway-common
    hostname: gateway-1
    environment:
      <<: *gateway-environment
      EUREKA_INSTANCE_HOSTNAME: gateway-1

  gateway-2:
    <<: *gateway-common
    hostname: gateway-2
    environment:
      <<: *gateway-environment
      EUREKA_INSTANCE_HOSTNAME: gateway-2

  rag-service-1:
    <<: *rag-service-common
    hostname: rag-service-1
    environment:
      <<: *observed-service-environment
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx384m"
      PORT: "8082"
      EUREKA_INSTANCE_HOSTNAME: rag-service-1
      POSTGRES_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in .env}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1/}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3:567m}
      REGULATION_MCP_URL: ${REGULATION_MCP_URL:-http://regulation-mcp:8084}
      APP_RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.45}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?Set TAVILY_API_KEY in .env}
      TAVILY_MCP_URL: ${TAVILY_MCP_URL:-https://mcp.tavily.com}
      GROQ_MAX_CONCURRENT_CALLS: ${GROQ_MAX_CONCURRENT_CALLS:-3}
      GROQ_LIMIT_FOR_PERIOD: ${GROQ_LIMIT_FOR_PERIOD:-3}

  rag-service-2:
    <<: *rag-service-common
    hostname: rag-service-2
    environment:
      <<: *observed-service-environment
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx384m"
      PORT: "8082"
      EUREKA_INSTANCE_HOSTNAME: rag-service-2
      POSTGRES_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in .env}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1/}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3:567m}
      REGULATION_MCP_URL: ${REGULATION_MCP_URL:-http://regulation-mcp:8084}
      APP_RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.45}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?Set TAVILY_API_KEY in .env}
      TAVILY_MCP_URL: ${TAVILY_MCP_URL:-https://mcp.tavily.com}
      GROQ_MAX_CONCURRENT_CALLS: ${GROQ_MAX_CONCURRENT_CALLS:-3}
      GROQ_LIMIT_FOR_PERIOD: ${GROQ_LIMIT_FOR_PERIOD:-3}

  rag-ingestion:
    <<: *rag-service-common
    profiles: ["admin"]
    hostname: rag-ingestion
    restart: "no"
    environment:
      <<: *observed-service-environment
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx384m"
      PORT: "8082"
      EUREKA_INSTANCE_HOSTNAME: rag-ingestion
      POSTGRES_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3:567m}
      APP_INGESTION_ENABLED: "true"
      APP_INGESTION_EXIT_ON_COMPLETION: "true"
      APP_RAG_AI_ENABLED: "false"
      SPRING_AI_MCP_CLIENT_ENABLED: "false"
      SPRING_AI_MODEL_CHAT: none

  question-normalizer:
    image: distributed-systems/question-normalizer:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
    build:
      context: .
      dockerfile: QuestionNormalizerFunction/Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
        BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
    hostname: question-normalizer
    environment:
      <<: *observed-service-environment
      PORT: "8083"
      EUREKA_INSTANCE_HOSTNAME: question-normalizer
    restart: "on-failure:3"
    mem_limit: 512m
    networks:
      - discovery
    depends_on:
      config-server:
        condition: service_healthy
      eureka-cluster:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 25s

  regulation-mcp:
    image: distributed-systems/regulation-mcp:${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
    build:
      context: .
      dockerfile: RegulationMcpServer/Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:?Set RELEASE_VERSION in .env}
        BUILD_REVISION: ${BUILD_REVISION:?Set BUILD_REVISION in .env}
    hostname: regulation-mcp
    environment:
      <<: *observed-service-environment
      PORT: "8084"
      EUREKA_INSTANCE_HOSTNAME: regulation-mcp
    restart: "on-failure:3"
    mem_limit: 512m
    networks:
      - discovery
    depends_on:
      config-server:
        condition: service_healthy
      eureka-cluster:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 25s

  question-service-1:
    <<: *question-service-common
    hostname: question-service-1
    environment:
      <<: *observed-service-environment
      PORT: "8081"
      EUREKA_INSTANCE_HOSTNAME: question-service-1
      NORMALIZER_URL: ${NORMALIZER_URL:-http://question-normalizer/normalizeQuestion}
      RAG_GRAPHQL_URL: ${RAG_GRAPHQL_URL:-http://rag-service/graphql}

  question-service-2:
    <<: *question-service-common
    hostname: question-service-2
    environment:
      <<: *observed-service-environment
      PORT: "8081"
      EUREKA_INSTANCE_HOSTNAME: question-service-2
      NORMALIZER_URL: ${NORMALIZER_URL:-http://question-normalizer/normalizeQuestion}
      RAG_GRAPHQL_URL: ${RAG_GRAPHQL_URL:-http://rag-service/graphql}

  gateway-edge:
    image: haproxy:3.2.20-alpine@sha256:9f196dc9ec57310a1a430939221b33b36c14113497aca7ead9b13f4d5c2d37f5
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - discovery
    depends_on:
      gateway-1:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
    volumes:
      - ./infrastructure/haproxy/gateway.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:?Set GATEWAY_HOST_PORT in .env}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - discovery
    depends_on:
      gateway-1:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
      question-service-1:
        condition: service_healthy
      question-service-2:
        condition: service_healthy
      rag-service-1:
        condition: service_healthy
      rag-service-2:
        condition: service_healthy
      question-normalizer:
        condition: service_healthy
      regulation-mcp:
        condition: service_healthy
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:?Set PROMETHEUS_HOST_PORT in .env}:9090"

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - discovery
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:?Set GRAFANA_HOST_PORT in .env}:3000"

  zipkin:
    image: openzipkin/zipkin:3.6.1@sha256:d17e856dcbba7ffeefbbfc252f89ab78a4ab6faed47e646d46daad78f91b5ee2
    environment:
      JAVA_OPTS: "-Xms64m -Xmx256m"
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - discovery
    ports:
      - "127.0.0.1:${ZIPKIN_HOST_PORT:?Set ZIPKIN_HOST_PORT in .env}:9411"

networks:
  discovery:
    name: distributed-systems-discovery

volumes:
  config-git-data:
    name: distributed-systems-config-git
  postgres-data:
    name: distributed-systems-postgres
  grafana-data:
    name: distributed-systems-grafana
  ollama-data:
    name: distributed-systems-ollama
