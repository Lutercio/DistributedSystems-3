global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option redispatch
    retries 2
    timeout connect 2s
    timeout client 30s
    timeout server 30s

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend eureka_cluster
    bind :8761
    default_backend eureka_peers

backend eureka_peers
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200
    server eureka-1 eureka-1:8761 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
    server eureka-2 eureka-2:8761 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
    server eureka-3 eureka-3:8761 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
