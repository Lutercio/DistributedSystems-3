global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option redispatch
    option forwardfor
    retries 2
    timeout connect 2s
    timeout client 30s
    timeout server 30s

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend gateway_edge
    bind :8080
    default_backend gateways

backend gateways
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200
    server gateway-1 gateway-1:8080 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
    server gateway-2 gateway-2:8080 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
