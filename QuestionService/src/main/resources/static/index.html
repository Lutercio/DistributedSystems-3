<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>UFRN Responde</title>
	<style>
		:root { color-scheme: light; font-family: system-ui, sans-serif; background: #f4f6f8; color: #17202a; }
		body { margin: 0; }
		main { width: min(720px, calc(100% - 2rem)); margin: 3rem auto; }
		section { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 8px 30px #17202a18; }
		h1 { margin-top: 0; color: #165c9c; }
		label { display: block; font-weight: 600; margin: 1rem 0 .35rem; }
		textarea, input { box-sizing: border-box; width: 100%; padding: .75rem; border: 1px solid #aeb6bf; border-radius: 6px; font: inherit; }
		textarea { min-height: 120px; resize: vertical; }
		.checkbox { display: flex; gap: .5rem; align-items: center; font-weight: 400; }
		.checkbox input { width: auto; }
		button { margin-top: 1rem; padding: .75rem 1.25rem; border: 0; border-radius: 6px; background: #165c9c; color: white; font: inherit; font-weight: 700; cursor: pointer; }
		button:disabled { opacity: .6; cursor: wait; }
		#result { margin-top: 1.5rem; white-space: pre-wrap; }
		.meta { color: #5d6d7e; font-size: .9rem; }
		.error { color: #a93226; }
	</style>
</head>
<body>
	<main>
		<section>
			<h1>UFRN Responde</h1>
			<p>Faça uma pergunta sobre o Regulamento dos Cursos de Graduação da UFRN.</p>
			<form id="question-form">
				<label for="conversation-id">Conversa (opcional)</label>
				<input id="conversation-id" maxlength="128" autocomplete="off">
				<label for="question">Pergunta</label>
				<textarea id="question" maxlength="1000" required></textarea>
				<label class="checkbox"><input id="verify" type="checkbox"> Verificar a fonte oficial online</label>
				<button id="submit" type="submit">Perguntar</button>
			</form>
			<div id="result" aria-live="polite"></div>
		</section>
	</main>
	<script>
		const form = document.querySelector('#question-form');
		const result = document.querySelector('#result');
		const submit = document.querySelector('#submit');
		form.addEventListener('submit', async (event) => {
			event.preventDefault();
			submit.disabled = true;
			result.className = '';
			result.textContent = 'Consultando...';
			const conversationInput = document.querySelector('#conversation-id');
			const payload = {
				conversationId: conversationInput.value,
				question: document.querySelector('#question').value,
				verifyOfficialSource: document.querySelector('#verify').checked
			};
			try {
				const response = await fetch('api/questions', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(payload)
				});
				const body = await response.json();
				if (!response.ok) throw new Error(body.message || 'Não foi possível obter a resposta.');
				conversationInput.value = body.conversationId;
				result.innerHTML = `<p>${escapeHtml(body.answer)}</p><p class="meta">Conversa: ${escapeHtml(body.conversationId)} · Resposta fundamentada: ${body.grounded ? 'sim' : 'não'}</p>`;
			} catch (error) {
				result.className = 'error';
				result.textContent = error.message;
			} finally {
				submit.disabled = false;
			}
		});
		function escapeHtml(value) {
			const element = document.createElement('span');
			element.textContent = value;
			return element.innerHTML;
		}
	</script>
</body>
</html>
