<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>UFRN Responde</title>
	<style>
		:root {
			color-scheme: light;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: #eef3f8;
			color: #17202a;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
		}

		main {
			width: min(880px, calc(100% - 2rem));
			margin: 2rem auto;
		}

		.chat {
			min-height: calc(100vh - 4rem);
			display: grid;
			grid-template-rows: auto 1fr auto;
			background: white;
			border-radius: 16px;
			box-shadow: 0 8px 30px #17202a18;
			overflow: hidden;
		}

		header {
			padding: 1.25rem 1.5rem;
			border-bottom: 1px solid #d7dee6;
			background: #f8fbff;
		}

		h1 {
			margin: 0 0 .25rem;
			color: #165c9c;
			font-size: 1.6rem;
		}

		header p {
			margin: 0;
			color: #52616f;
		}

		#messages {
			display: flex;
			flex-direction: column;
			gap: 1rem;
			padding: 1.5rem;
			overflow-y: auto;
		}

		.message {
			max-width: min(680px, 92%);
			padding: .9rem 1rem;
			border-radius: 14px;
			line-height: 1.45;
			white-space: pre-wrap;
			overflow-wrap: anywhere;
		}

		.message.user {
			align-self: flex-end;
			background: #165c9c;
			color: white;
			border-bottom-right-radius: 4px;
		}

		.message.assistant {
			align-self: flex-start;
			background: #edf4fb;
			border-bottom-left-radius: 4px;
		}

		.message.error {
			align-self: flex-start;
			background: #fdecea;
			color: #922b21;
			border: 1px solid #f5b7b1;
		}

		.message.loading {
			color: #52616f;
			font-style: italic;
		}

		.sources {
			margin-top: .75rem;
			padding-top: .75rem;
			border-top: 1px solid #ccd8e3;
			white-space: normal;
		}

		.sources h2 {
			margin: 0 0 .5rem;
			font-size: 1rem;
		}

		.sources ul {
			margin: 0;
			padding-left: 1.25rem;
		}

		.sources li + li {
			margin-top: .5rem;
		}

		.meta {
			margin-top: .75rem;
			color: #5d6d7e;
			font-size: .85rem;
			white-space: normal;
		}

		form {
			display: grid;
			gap: .75rem;
			padding: 1rem 1.5rem 1.25rem;
			border-top: 1px solid #d7dee6;
			background: #f8fbff;
		}

		label {
			font-weight: 600;
		}

		textarea {
			width: 100%;
			min-height: 80px;
			max-height: 220px;
			resize: vertical;
			padding: .8rem;
			border: 1px solid #aeb6bf;
			border-radius: 10px;
			font: inherit;
		}

		.controls {
			display: flex;
			gap: 1rem;
			align-items: center;
			justify-content: space-between;
			flex-wrap: wrap;
		}

		.checkbox {
			display: flex;
			gap: .5rem;
			align-items: center;
			font-weight: 400;
			color: #34495e;
		}

		button {
			padding: .75rem 1.25rem;
			border: 0;
			border-radius: 10px;
			background: #165c9c;
			color: white;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
		}

		button:disabled {
			opacity: .6;
			cursor: wait;
		}

		.empty-state {
			margin: auto;
			max-width: 520px;
			color: #52616f;
			text-align: center;
		}
	</style>
</head>
<body>
	<main>
		<section class="chat" aria-label="Chat UFRN Responde">
			<header>
				<h1>UFRN Responde</h1>
				<p>Faça perguntas sobre o Regulamento dos Cursos de Graduação da UFRN.</p>
			</header>

			<div id="messages" aria-live="polite">
				<div class="empty-state" id="empty-state">
					Envie uma pergunta para iniciar a conversa.
				</div>
			</div>

			<form id="question-form">
				<label for="question">Mensagem</label>
				<textarea id="question" maxlength="1000" required placeholder="Ex.: Quando ocorre o cancelamento de programa por abandono de curso?"></textarea>
				<div class="controls">
					<label class="checkbox">
						<input id="verify" type="checkbox">
						Verificar a fonte oficial online
					</label>
					<button id="submit" type="submit">Enviar</button>
				</div>
			</form>
		</section>
	</main>

	<script>
		const form = document.querySelector('#question-form');
		const messages = document.querySelector('#messages');
		const emptyState = document.querySelector('#empty-state');
		const questionInput = document.querySelector('#question');
		const submit = document.querySelector('#submit');
		const verifyInput = document.querySelector('#verify');
		const questionsEndpoint = resolveQuestionsEndpoint(window.location.pathname);

		let conversationId = '';

		form.addEventListener('submit', async (event) => {
			event.preventDefault();

			const question = questionInput.value.trim();
			if (!question) return;

			appendTextMessage('user', question);
			questionInput.value = '';
			submit.disabled = true;

			const loadingMessage = appendTextMessage('assistant loading', 'Consultando...');

			try {
				const response = await fetch(questionsEndpoint, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						conversationId,
						question,
						verifyOfficialSource: verifyInput.checked
					})
				});

				const body = await readJson(response);
				if (!response.ok) {
					throw new Error(errorMessage(body, response));
				}

				conversationId = body.conversationId || conversationId;
				renderAnswer(loadingMessage, body);
			} catch (error) {
				loadingMessage.className = 'message error';
				loadingMessage.textContent = error.message;
			} finally {
				submit.disabled = false;
				questionInput.focus();
				scrollToBottom();
			}
		});

		function resolveQuestionsEndpoint(pathname) {
			const basePath = pathname
					.replace(/\/index\.html$/, '')
					.replace(/\/$/, '');
			return `${basePath}/api/questions`;
		}

		async function readJson(response) {
			const text = await response.text();
			if (!text) return {};
			try {
				return JSON.parse(text);
			} catch (error) {
				return { message: text };
			}
		}

		function errorMessage(body, response) {
			const message = body?.message || 'Não foi possível obter a resposta.';
			const details = [];
			if (body?.code) details.push(body.code);
			if (body?.correlationId) details.push(`correlation ${body.correlationId}`);
			if (body?.requestId) details.push(`request ${body.requestId}`);
			if (!details.length && response?.status) details.push(`HTTP ${response.status}`);
			return details.length ? `${message} (${details.join(', ')})` : message;
		}

		questionInput.addEventListener('keydown', (event) => {
			if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
				form.requestSubmit();
			}
		});

		function appendTextMessage(type, text) {
			emptyState?.remove();

			const message = document.createElement('article');
			message.className = `message ${type}`;
			message.textContent = text;
			messages.append(message);
			scrollToBottom();
			return message;
		}

		function renderAnswer(message, body) {
			message.className = 'message assistant';
			message.textContent = '';

			const answer = document.createElement('div');
			answer.textContent = body.answer || 'Sem resposta.';
			message.append(answer);

			if (body.sources?.length) {
				message.append(renderSources(body.sources));
			}

			message.append(renderMeta(body));
		}

		function renderSources(sources) {
			const wrapper = document.createElement('section');
			wrapper.className = 'sources';

			const title = document.createElement('h2');
			title.textContent = 'Fontes';
			wrapper.append(title);

			const list = document.createElement('ul');
			for (const source of sources) {
				const item = document.createElement('li');

				const article = document.createElement('strong');
				article.textContent = source.article || source.documentTitle || 'Fonte';
				item.append(article, `: ${source.excerpt || ''} `);

				if (source.officialUrl) {
					const link = document.createElement('a');
					link.href = source.officialUrl;
					link.target = '_blank';
					link.rel = 'noreferrer';
					link.textContent = 'fonte oficial';
					item.append(link);
				}

				list.append(item);
			}

			wrapper.append(list);
			return wrapper;
		}

		function renderMeta(body) {
			const tools = body.toolsUsed?.length ? body.toolsUsed.join(', ') : 'nenhuma';
			const meta = document.createElement('p');
			meta.className = 'meta';
			meta.textContent = [
				`Conversa: ${body.conversationId || 'não informada'}`,
				`Resposta fundamentada: ${body.grounded ? 'sim' : 'não'}`,
				`Fonte verificada online: ${body.verifiedOnline ? 'sim' : 'não'}`,
				`Ferramentas: ${tools}`
			].join(' · ');
			return meta;
		}

		function scrollToBottom() {
			messages.scrollTop = messages.scrollHeight;
		}
	</script>
</body>
</html>
