spring.application.name=config-server
server.port=${PORT}

spring.cloud.config.server.accept-empty=false
spring.cloud.config.server.git.uri=${CONFIG_GIT_URI}
spring.cloud.config.server.git.search-paths=config-repository/config,config-repository/config/{application}
spring.cloud.config.server.git.default-label=${CONFIG_GIT_DEFAULT_LABEL}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.force-pull=true
spring.cloud.config.server.git.timeout=5

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

management.endpoints.web.exposure.include=health,info,metrics
