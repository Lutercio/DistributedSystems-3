spring.application.name=config-server
server.port=${SERVER_PORT:8888}

spring.profiles.active=${CONFIG_SERVER_PROFILE:git}

spring.cloud.config.server.accept-empty=false
spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:file:/config-repository}
spring.cloud.config.server.git.search-paths=${CONFIG_GIT_SEARCH_PATHS:config,config/{application}}
spring.cloud.config.server.git.default-label=${CONFIG_GIT_DEFAULT_LABEL:main}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.force-pull=true
spring.cloud.config.server.git.timeout=5

management.endpoints.web.exposure.include=health,info,metrics
