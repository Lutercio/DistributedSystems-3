spring.application.name=regulation-mcp
server.port=0
spring.config.import=optional:file:./test-config-not-present.properties
spring.cloud.config.enabled=false
spring.cloud.config.request-connect-timeout=2000
spring.cloud.config.request-read-timeout=5000
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=2000
spring.cloud.config.retry.multiplier=1.5
spring.ai.mcp.server.enabled=false
regulation.corpus-path=../knowledge-base/regulamento_dos_cursos_de_graduacao.pdf
regulation.metadata-path=../knowledge-base/metadata.properties
