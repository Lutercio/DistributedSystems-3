spring.application.name=rag-service
server.port=0
spring.config.import=optional:file:./test-config-not-present.properties
spring.cloud.config.enabled=false
spring.cloud.config.request-connect-timeout=2000
spring.cloud.config.request-read-timeout=5000
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=2000
spring.cloud.config.retry.multiplier=1.5
spring.ai.openai.api-key=test
spring.ai.openai.chat.enabled=false
spring.ai.openai.embedding.enabled=false
spring.ai.vectorstore.pgvector.enabled=false
spring.ai.chat.memory.repository.jdbc.enabled=false
spring.ai.mcp.client.enabled=false
app.rag.ai-enabled=false
app.rag.top-k=6
app.rag.similarity-threshold=0.72
app.rag.max-memory-messages=10
app.rag.chunk-characters=3500
app.rag.chunk-overlap=300
app.rag.corpus-path=../knowledge-base/regulamento_dos_cursos_de_graduacao.pdf
app.rag.metadata-path=../knowledge-base/metadata.properties
