eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.registry-fetch-interval-seconds=67

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.server.webflux.discovery.locator.include-expression=metadata['gateway-exposed'] == 'true'
spring.cloud.gateway.server.webflux.discovery.locator.predicates[0].name=Path
spring.cloud.gateway.server.webflux.discovery.locator.predicates[0].args[pattern]='/' + serviceId + '/**'
spring.cloud.gateway.server.webflux.discovery.locator.filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.discovery.locator.filters[0].args[name]=serviceId
spring.cloud.gateway.server.webflux.discovery.locator.filters[0].args[fallbackUri]='forward:/internal/gateway-fallback'
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].name=Retry
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[retries]=2
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[statuses]='BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT'
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[methods]='GET,HEAD'
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[backoff.firstBackoff]='100ms'
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[backoff.maxBackoff]='1s'
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[backoff.factor]=2
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[backoff.basedOnPreviousValue]=true
spring.cloud.gateway.server.webflux.discovery.locator.filters[1].args[jitter.randomFactor]=0.2
spring.cloud.gateway.server.webflux.discovery.locator.filters[2].name=StripPrefix
spring.cloud.gateway.server.webflux.discovery.locator.filters[2].args[parts]=1

spring.cloud.gateway.server.webflux.httpclient.connect-timeout=2000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=60s
spring.cloud.gateway.server.webflux.metrics.enabled=true
spring.cloud.gateway.server.webflux.metrics.tags.path.enabled=false

resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.configs.default.timeout-duration=60s
resilience4j.timelimiter.configs.default.cancel-running-future=true

management.endpoint.gateway.access=read-only
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT}
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway,refresh,circuitbreakers

logging.pattern.correlation=[${spring.application.name:gateway},%X{traceId:-},%X{spanId:-}] 
