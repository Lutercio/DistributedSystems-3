eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
eureka.instance.metadata-map.gateway-exposed=true
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.registry-fetch-interval-seconds=5

downstream.normalizer-url=${NORMALIZER_URL:http://question-normalizer/normalizeQuestion}
downstream.rag-graphql-url=${RAG_GRAPHQL_URL:http://rag-service/graphql}
downstream.normalizer-timeout=1s
downstream.rag-timeout=45s

resilience4j.circuitbreaker.instances.normalizer.register-health-indicator=true
resilience4j.circuitbreaker.instances.normalizer.sliding-window-size=10
resilience4j.circuitbreaker.instances.normalizer.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.normalizer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.normalizer.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.normalizer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.normalizer.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.retry.instances.normalizer.max-attempts=2
resilience4j.retry.instances.normalizer.wait-duration=100ms
resilience4j.retry.instances.normalizer.enable-exponential-backoff=true
resilience4j.retry.instances.normalizer.exponential-backoff-multiplier=2

resilience4j.circuitbreaker.instances.ragService.register-health-indicator=true
resilience4j.circuitbreaker.instances.ragService.sliding-window-size=10
resilience4j.circuitbreaker.instances.ragService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.ragService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ragService.ignore-exceptions=io.github.resilience4j.ratelimiter.RequestNotPermitted,com.distributed_systems.question.client.DownstreamRateLimitException,com.distributed_systems.question.client.DownstreamAiProviderUnavailableException
resilience4j.circuitbreaker.instances.ragService.slow-call-duration-threshold=30s
resilience4j.circuitbreaker.instances.ragService.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.ragService.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.ragService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ragService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.bulkhead.instances.ragService.max-concurrent-calls=20
resilience4j.bulkhead.instances.ragService.max-wait-duration=0
resilience4j.ratelimiter.instances.ragService.limit-for-period=30
resilience4j.ratelimiter.instances.ragService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.ragService.timeout-duration=0

app.question-service.circuit-breaker-recovery.enabled=${QUESTION_SERVICE_CIRCUIT_BREAKER_RECOVERY_ENABLED:false}
app.question-service.circuit-breaker-recovery.interval=2s
app.question-service.circuit-breaker-recovery.timeout=2s
app.question-service.circuit-breaker-recovery.targets[0].breaker-name=ragService
app.question-service.circuit-breaker-recovery.targets[0].health-uri=http://rag-service/actuator/health
app.question-service.circuit-breaker-recovery.targets[1].breaker-name=normalizer
app.question-service.circuit-breaker-recovery.targets[1].health-uri=http://question-normalizer/actuator/health

management.endpoint.health.show-details=always
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT}
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus,refresh,circuitbreakers

logging.pattern.correlation=[${spring.application.name:question-service},%X{traceId:-},%X{spanId:-}]
