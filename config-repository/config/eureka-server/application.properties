eureka.instance.hostname=${EUREKA_HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_PEERS}

management.endpoints.web.exposure.include=health,info,metrics,refresh
