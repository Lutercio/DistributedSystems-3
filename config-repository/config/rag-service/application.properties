eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.registry-fetch-interval-seconds=5

spring.graphql.http.path=/graphql
spring.graphql.graphiql.enabled=false

spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.timeout=12s
spring.ai.openai.max-retries=2
spring.ai.openai.connection-pool-metrics-enabled=true
spring.ai.openai.chat.model=gpt-5.4-mini-2026-03-17
spring.ai.openai.chat.max-completion-tokens=300
spring.ai.openai.chat.n=1
spring.ai.openai.chat.store=false
spring.ai.openai.embedding.model=text-embedding-3-small
spring.ai.openai.embedding.dimensions=1536
spring.ai.retry.max-attempts=2
spring.ai.retry.backoff.initial-interval=250ms
spring.ai.retry.backoff.max-interval=1s

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.remove-existing-vector-store-table=false
# Spring AI validates before running its initializer; keep this disabled so a
# fresh PostgreSQL volume can create vector_store on first boot.
spring.ai.vectorstore.pgvector.schema-validation=false

spring.ai.chat.memory.repository.jdbc.initialize-schema=always

spring.ai.mcp.client.name=ufrn-responde-rag
spring.ai.mcp.client.version=0.0.1
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.request-timeout=3s
spring.ai.mcp.client.streamable-http.connections.regulation.url=http://regulation-mcp:8084
spring.ai.mcp.client.streamable-http.connections.regulation.endpoint=/mcp

app.rag.top-k=6
app.rag.similarity-threshold=0.72
app.rag.max-memory-messages=10
app.rag.chunk-characters=3500
app.rag.chunk-overlap=300
app.rag.corpus-path=/knowledge-base/regulamento_dos_cursos_de_graduacao.pdf
app.rag.metadata-path=/knowledge-base/metadata.properties
app.ingestion.enabled=${APP_INGESTION_ENABLED:false}
app.ingestion.exit-on-completion=${APP_INGESTION_EXIT_ON_COMPLETION:true}

resilience4j.circuitbreaker.instances.openai.register-health-indicator=true
resilience4j.circuitbreaker.instances.openai.sliding-window-size=10
resilience4j.circuitbreaker.instances.openai.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.openai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openai.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.openai.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.openai.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.openai.permitted-number-of-calls-in-half-open-state=2
resilience4j.bulkhead.instances.openai.max-concurrent-calls=${OPENAI_MAX_CONCURRENT_CALLS:10}
resilience4j.bulkhead.instances.openai.max-wait-duration=0
resilience4j.ratelimiter.instances.openai.limit-for-period=${OPENAI_LIMIT_FOR_PERIOD:20}
resilience4j.ratelimiter.instances.openai.limit-refresh-period=1s
resilience4j.ratelimiter.instances.openai.timeout-duration=0
resilience4j.circuitbreaker.instances.tavily.register-health-indicator=true
resilience4j.circuitbreaker.instances.tavily.sliding-window-size=10
resilience4j.circuitbreaker.instances.tavily.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.tavily.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tavily.wait-duration-in-open-state=15s
resilience4j.bulkhead.instances.tavily.max-concurrent-calls=4
resilience4j.bulkhead.instances.tavily.max-wait-duration=0

management.endpoint.health.show-details=always
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT}
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus,refresh,circuitbreakers

logging.pattern.correlation=[${spring.application.name:rag-service},%X{traceId:-},%X{spanId:-}]
