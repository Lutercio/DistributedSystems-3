eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
eureka.client.service-url.defaultZone=${EUREKA_URL}

spring.ai.mcp.server.name=ufrn-regulation-mcp
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=Ferramentas somente leitura para o Regulamento dos Cursos de Graduacao da UFRN
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

regulation.corpus-path=/knowledge-base/regulamento_dos_cursos_de_graduacao.pdf
regulation.metadata-path=/knowledge-base/metadata.properties

management.endpoint.health.show-details=always
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT}
management.endpoints.web.exposure.include=health,info,metrics,prometheus,refresh

logging.pattern.correlation=[${spring.application.name:regulation-mcp},%X{traceId:-},%X{spanId:-}]
